; HT-N5262M Meshtastic variant
; nRF52840 + SX1262 + TCXO + ST7789 1.14" 240×135 + USER_KEY button.
; Carrier-side peripherals not yet enabled here: GNSS (L76K), RS485, DWM3000.

[env:ht_n5262m]
custom_meshtastic_hw_model = 255
custom_meshtastic_hw_model_slug = PRIVATE_HW
custom_meshtastic_architecture = nrf52840
custom_meshtastic_actively_supported = false
custom_meshtastic_support_level = 1
custom_meshtastic_display_name = HT-N5262M
custom_meshtastic_tags = Heltec, Silic

extends = nrf52840_base
board = ht_n5262m
debug_tool = cmsis-dap

; SPI_INTERFACES_COUNT=2 — SX1262 owns SPI0, ST7789 owns SPI1.
build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/ht_n5262m
  -DHT_N5262M
  -DSPI_INTERFACES_COUNT=2
  -DHAS_GPS=0
  -DMESHTASTIC_EXCLUDE_GPS=1
  -DMESHTASTIC_EXCLUDE_PAXCOUNTER=1

build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/ht_n5262m>

; meshtastic/st7789 — same driver/commit T114 uses (renovate-pinned upstream).
lib_deps = ${nrf52840_base.lib_deps}
  https://github.com/meshtastic/st7789/archive/5180423ae2dbf5885168a8bfb308c7fb7eff6930.zip
